variables: &env
  BASE_BRANCH: master
  BRANCH: &branch update/package-${PACKAGE}

when:
  - event: manual
  - event: cron
    cron: update-packages

clone:
  - name: git
    image: woodpeckerci/plugin-git
    settings:
      partial: false
      depth: 0

matrix:
  PACKAGE:
    - alvr-bin
    - lidarr-plugins
    - mcp-sequential-thinking
    - mcp-server-amazon
    - proton-mcp
    - pyarlo
    - pyuptimekuma
    - ssh-terminal-manager
    - terminal-manager

steps:
  - name: update-package-${PACKAGE}
    image: registry.racci.dev/lix-woodpecker
    environment: *env
    commands: |
      set -euo pipefail

      nix run .#setup-git
      export NIX_PATH=nixpkgs=channel:nixos-unstable
      nix develop --no-pure-eval --accept-flake-config --command \
        nix-update --flake "${PACKAGE}" --use-update-script || {
        echo "nix-update failed for ${PACKAGE}"
        exit 1
      }

  - name: Push to Branch
    image: appleboy/drone-git-push
    depends_on:
      - update-package-${PACKAGE}
    settings:
      remote: git@github.com:DaRacci/nix-config.git
      branch: *branch
      rebase: true
      commit: true
      empty_commit: false
      author_name: "Woodpecker CI"
      author_email: "woodpecker@racci.dev"
      commit_message: "chore(pkgs): update ${PACKAGE} version"
      ssh_key:
        from_secret: GITHUB_AUTH_KEY

  - name: Create/Update PR
    image: registry.racci.dev/lix-woodpecker
    pull: true
    depends_on:
      - Push to Branch
    environment:
      <<: *env
      GITHUB_TOKEN:
        from_secret: GITHUB_TOKEN
    commands: |-
      git fetch --depth=1 origin "${BASE_BRANCH}" "$BRANCH"
      if git diff --quiet "origin/${BASE_BRANCH}"..."origin/${BRANCH}"; then
        echo "No changes detected for ${PACKAGE}, skipping PR creation."
        exit 0
      fi

      TITLE=$(git log -1 --pretty=%s "origin/${BRANCH}")
      nix run .#create-pr -- \
        --title "$TITLE" \
        --branch "$BRANCH" \
        --base "${BASE_BRANCH}" \
        --labels "dependencies,automated,merge-queue" \
        --reviewers "DaRacci" \
        --body "This PR was created automatically by the Woodpecker update-packages pipeline."
