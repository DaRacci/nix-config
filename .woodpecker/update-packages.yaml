variables: &env
  BASE_BRANCH: &base_branch master
  BRANCH: &branch update/package-${PACKAGE}

when:
  - event: manual
  - event: cron
    cron: update-packages

clone:
  - name: git
    image: woodpeckerci/plugin-git
    settings:
      partial: false
      depth: 0

matrix:
  PACKAGE:
    - alvr-bin
    - lidarr-plugins
    - mcp-sequential-thinking
    - mcp-server-amazon
    - proton-mcp
    - pyarlo
    - pyuptimekuma
    - ssh-terminal-manager
    - terminal-manager

steps:
  - name: update-package-${PACKAGE}
    image: registry.racci.dev/lix-woodpecker
    environment: *env
    commands: |
      set -euo pipefail

      nix run .#setup-git
      export NIX_PATH=nixpkgs=channel:nixos-unstable
      nix develop --no-pure-eval --accept-flake-config --command \
        nix-update --flake "${PACKAGE}" --use-update-script --commit || {
        echo "nix-update failed for ${PACKAGE}"
        exit 1
      }

  - name: Push to Branch
    image: appleboy/drone-git-push
    settings:
      remote: git@github.com:DaRacci/nix-config.git
      branch: *branch
      force: true
      ssh_key:
        from_secret: GITHUB_AUTH_KEY

  - name: Create/Update PR
    image: registry.racci.dev/lix-woodpecker
    pull: true
    environment:
      <<: *env
      GITHUB_TOKEN:
        from_secret: GITHUB_TOKEN
    commands: |-
      # check if the head commit of the branch is different from the base branch to avoid creating PRs with no changes
      if git rev-parse HEAD | grep -q "$(git rev-parse "${BASE_BRANCH}")"; then
        echo "No changes detected for ${PACKAGE}, skipping PR creation."
        exit 0
      fi

      TITLE=$(git log -1 --pretty=%s)
      nix run .#create-pr -- \
        --title "$TITLE" \
        --branch "$BRANCH" \
        --base "${BASE_BRANCH}" \
        --labels "dependencies,automated,merge-queue" \
        --reviewers "DaRacci" \
        --body "This PR was created automatically by the Woodpecker update-packages pipeline."
