labels:
  platform: linux/amd64

when:
  - event: manual
  - event: [push, pull_request]
    branch: master
    path:
      [
        .woodpecker/ci-homes.yaml,
        home/**,
        modules/home-manager/**,
        overlays/**,
        flake.nix,
        flake.lock,
      ]

clone:
  - name: git
    image: woodpeckerci/plugin-git
    settings:
      partial: false
      depth: 0

matrix:
  HOME:
    - racci

steps:
  - name: decide-${HOME}
    image: registry.racci.dev/lix-woodpecker
    pull: true
    commands: |
      set -euo pipefail

      SHOULD_BUILD=false
      if [ "$${CI_PREV_PIPELINE_STATUS}" = "error" ]; then
        echo "Previous pipeline failed for $${HOME}, Building to check if it was a transient issue."
        SHOULD_BUILD=true
      else
        echo "Previous pipeline state was $${CI_PREV_PIPELINE_STATUS} for $${HOME}, checking if it is affected by changes."
        if [ -n "$${CI_PREV_COMMIT_SHA:-}" ]; then
          RANGE="$${CI_PREV_COMMIT_SHA}..$${CI_COMMIT_SHA}"
          AFFECTED=$(nix run .#detect-affected-outputs -- homeConfigurations --json --range "$${RANGE}" --outputs "$${HOME}" 2>/dev/null || echo "[]")
          if echo "$${AFFECTED}" | jq -e --arg home "$${HOME}" 'index($home)' > /dev/null 2>&1; then
            echo "Home $${HOME} is affected by changes, proceeding with build"
            SHOULD_BUILD=true
          else
            echo "Home $${HOME} is not affected by changes, skipping build"
          fi
        else
          echo "No previous commit SHA, building..."
          SHOULD_BUILD=true
        fi
      fi

      if [ "$${SHOULD_BUILD}" = "true" ]; then
        touch .do-build
      fi

  - name: build-${HOME}
    image: registry.racci.dev/lix-woodpecker
    pull: true
    depends_on: ["decide-${HOME}"]
    environment:
      BINARY_CACHE_TOKEN:
        from_secret: BINARY_CACHE_TOKEN
    commands: |-
      if [ ! -f .do-build ]; then
        echo "Skipping build for ${HOME} - not affected by changes"
        exit 0
      fi

      nix run .#setup-attic
      nix run .#archive-flakes -- "." "flake/nixos" "flake/home-manager"
      nix-fast-build --no-nom --no-link --attic-cache raccidev --skip-cached --flake ".#homeConfigurations.${HOME}.activationPackage"
