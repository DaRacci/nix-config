# VM Integration Test Workflow
# Runs on pull_request events only, on KVM-capable runners.
# Builds nixosTestConfigurations.* targets for ALL server hosts.
# Affected-host selection (building only hosts changed by a PR)
# is deferred to a future iteration.
#
# This workflow is independent of check.yaml — failures here
# do not affect the check.yaml status.

labels:
  platform: linux/amd64
  kvm: true

when:
  - event: pull_request

steps:
  - name: Build VM tests
    image: registry.racci.dev/lix-woodpecker:latest
    pull: true
    environment:
      binary_cache_token:
        from_secret: binary_cache_token
    commands: |
      nix run .#setup-attic -- --watch
      nix run .#archive-flakes -- "." "flake/nixos"

  - name: Run VM tests
    image: registry.racci.dev/lix-woodpecker:latest
    commands: |
      for host in $(nix eval .#nixosTestConfigurations --apply 'builtins.attrNames' --json | jq -r '.[]'); do
        echo "::group::VM test: $host"
        nix build ".#nixosTestConfigurations.$host" --no-link -L || echo "FAILED: $host"
        echo "::endgroup::"
      done
